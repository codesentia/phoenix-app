apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: team-phoenix
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
            - name: GUNICORN_CMD_ARGS
              value: "--bind=0.0.0.0:80 --workers=2"
